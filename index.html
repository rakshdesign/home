<!DOCTYPE html>
<html>
<head>
    <title>Plastic Bag Fountain</title>
</head>

<body>

<canvas id="grain"></canvas>

<audio id="bgm" src="music.mp3" loop></audio>

<div class="container">
    <img src="topcover.png" id="bag" class="floating">

    <div class="gallery">
        <!-- wrapped in links -->
        <a href="https://link1.com" target="_blank"><img src="1.png" class="item i1"></a>

        <!-- TENNIS BALL (NO LINK) -->
        <img src="2.png" class="item i2" id="ball">

        <a href="https://t.me/canyouhearthemusic" target="_blank"><img src="3.png" class="item i3"></a>
        <a href="https://link4.com" target="_blank"><img src="4.png" class="item i4"></a>
        <a href="https://link5.com" target="_blank"><img src="5.png" class="item i5"></a>
    </div>
</div>

<style>
body {
    margin: 0;
    background: #EFEF20;
    height: 100vh;
    overflow: hidden;
}

/* grain */
#grain {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
    opacity: 0.1;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#bag {
    width: 300px;
    cursor: pointer;
    z-index: 2;
}

.floating {
    animation: float 3s ease-in-out infinite;
}
.stop-float {
    animation: none;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* gallery */
.gallery {
    position: absolute;
}

/* items */
.item {
    position: absolute;
    max-width: 150px;
    opacity: 0;
    z-index: 1;
    transform: translate(0,0) scale(0.2);
    transition: transform 0.8s ease, opacity 0.5s ease;
    cursor: grab;
    touch-action: none;
}

/* arc */
.i1 { --x: -200px; --y: -150px; }
.i2 { --x: -100px; --y: -220px; }
.i3 { --x: 0px;   --y: -250px; }
.i4 { --x: 100px; --y: -220px; }
.i5 { --x: 200px; --y: -150px; }

.show .item {
    opacity: 1;
    transform: translate(var(--x), var(--y)) scale(1);
}
</style>

<script>
const bag = document.getElementById("bag");
const gallery = document.querySelector(".gallery");
const items = document.querySelectorAll(".item");
const audio = document.getElementById("bgm");
const ball = document.getElementById("ball");

audio.volume = 0.6;

/* toggle */
bag.onclick = () => {
    const open = gallery.classList.toggle("show");

    if (open) {
        bag.classList.remove("floating");
        bag.classList.add("stop-float");

        setTimeout(() => items.forEach(i => i.style.zIndex = 5), 400);

        audio.play().catch(()=>{});
    } else {
        bag.classList.add("floating");
        bag.classList.remove("stop-float");

        items.forEach(i=>{
            i.style.zIndex = 1;
            i.style.transform="";
            i.dataset.dx=0;
            i.dataset.dy=0;
        });

        audio.pause();
    }
};

/* DRAG (POINTER) */
items.forEach(item=>{
    let startX, startY, dx=0, dy=0;

    item.addEventListener("pointerdown", e=>{
        if(item===ball && ball.dataset.animating==="true") return;

        item.setPointerCapture(e.pointerId);
        startX=e.clientX;
        startY=e.clientY;

        dx=parseFloat(item.dataset.dx)||0;
        dy=parseFloat(item.dataset.dy)||0;

        item.style.transition="none";
    });

    item.addEventListener("pointermove", e=>{
        if(!item.hasPointerCapture(e.pointerId)) return;

        let mx=dx+(e.clientX-startX);
        let my=dy+(e.clientY-startY);

        item.style.transform=
        `translate(calc(var(--x) + ${mx}px), calc(var(--y) + ${my}px)) scale(1)`;
    });

    item.addEventListener("pointerup", e=>{
        dx += (e.clientX-startX);
        dy += (e.clientY-startY);

        item.dataset.dx=dx;
        item.dataset.dy=dy;
    });
});

/* TENNIS BALL PHYSICS */
ball.onclick = () => {
    if (ball.dataset.animating==="true") return;

    ball.dataset.animating="true";

    let rect = ball.getBoundingClientRect();
    let x = rect.left;
    let y = rect.top;

    let vx = 6 * (Math.random() > 0.5 ? 1 : -1);
    let vy = -8;

    let gravity = 0.4;
    let bounces = 0;

    function animate() {
        x += vx;
        y += vy;
        vy += gravity;

        let w = window.innerWidth;
        let h = window.innerHeight;

        let bw = ball.offsetWidth;
        let bh = ball.offsetHeight;

        // walls
        if (x <= 0 || x + bw >= w) {
            vx *= -1;
            bounces++;
        }

        // top
        if (y <= 0) {
            vy *= -1;
            bounces++;
        }

        // ground
        if (y + bh >= h) {
            y = h - bh;
            vy *= -0.7;
            bounces++;
        }

        ball.style.transform = `translate(${x - w/2 + bw/2}px, ${y - h/2 + bh/2}px) scale(1)`;

        if (bounces < 6) {
            requestAnimationFrame(animate);
        } else {
            // final fall
            vy = 2;
            function fall(){
                y += vy;
                vy += gravity;

                if(y + bh >= h){
                    y = h - bh;
                    ball.dataset.animating="false";
                    return;
                }

                ball.style.transform = `translate(${x - w/2 + bw/2}px, ${y - h/2 + bh/2}px) scale(1)`;
                requestAnimationFrame(fall);
            }
            fall();
        }
    }

    animate();
};

/* GRAIN */
const canvas = document.getElementById("grain");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

function grain(){
    let w=canvas.width,h=canvas.height;
    let img=ctx.createImageData(w,h);
    let buf=new Uint32Array(img.data.buffer);

    for(let i=0;i<buf.length;i++){
        let v=Math.random()*255|0;
        buf[i]=(255<<24)|(v<<16)|(v<<8)|v;
    }

    ctx.putImageData(img,0,0);
    requestAnimationFrame(grain);
}
grain();
</script>

</body>
</html>
