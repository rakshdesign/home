<!DOCTYPE html>
<html>
<head>
    <title>Plastic Bag Fountain</title>
</head>

<body>

<canvas id="grain"></canvas>

<!-- AUDIO -->
<audio id="bgm" src="music.mp3" loop></audio>

<div class="container">
    <!-- Bag -->
    <img src="topcover.png" id="bag" class="floating" alt="plastic bag">

    <!-- Images -->
    <div class="gallery">
        <img src="1.png" class="item i1">
        <img src="2.png" class="item i2">
        <img src="3.png" class="item i3">
        <img src="4.png" class="item i4">
        <img src="5.png" class="item i5">
    </div>
</div>

<style>
body {
    margin: 0;
    background: #EFEF20;
    height: 100vh;
    overflow: hidden;
}

/* GRAIN */
#grain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999;
    opacity: 0.1;
}

/* Layout */
.container {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Bag */
#bag {
    width: 300px;
    cursor: pointer;
    z-index: 2;
}

/* Floating */
.floating {
    animation: float 3s ease-in-out infinite;
}

.stop-float {
    animation: none;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* Gallery */
.gallery {
    position: absolute;
}

/* Images */
.item {
    position: absolute;
    max-width: 150px;

    opacity: 0;
    z-index: 1;

    transform: translate(0, 0) scale(0.2);
    transition: transform 0.8s cubic-bezier(.25,.8,.25,1), opacity 0.5s ease;

    cursor: grab;
}

/* ACTIVE */
.show .item {
    opacity: 1;
}

/* ARC POSITIONS */
.i1 { --x: -200px; --y: -150px; --r: -20deg; }
.i2 { --x: -100px; --y: -220px; --r: -10deg; }
.i3 { --x: 0px;   --y: -250px; --r: 0deg; }
.i4 { --x: 100px; --y: -220px; --r: 10deg; }
.i5 { --x: 200px; --y: -150px; --r: 20deg; }

.show .item {
    transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1);
}

</style>

<script>
const bag = document.getElementById("bag");
const gallery = document.querySelector(".gallery");
const items = document.querySelectorAll(".item");
const audio = document.getElementById("bgm");

/* TOGGLE (NOW ALSO PLAY/PAUSE) */
bag.addEventListener("click", () => {
    const isOpen = gallery.classList.toggle("show");

    if (isOpen) {
        // STOP FLOAT
        bag.classList.remove("floating");
        bag.classList.add("stop-float");

        // BRING ABOVE
        setTimeout(() => {
            items.forEach(item => item.style.zIndex = 5);
        }, 400);

        // PLAY / RESUME MUSIC
        audio.play().catch(() => {});

    } else {
        // RESUME FLOAT
        bag.classList.remove("stop-float");
        bag.classList.add("floating");

        // RESET LAYERS
        items.forEach(item => {
            item.style.zIndex = 1;
            item.dataset.dx = 0;
            item.dataset.dy = 0;
            item.style.transform = "";
        });

        // PAUSE MUSIC
        audio.pause();
    }
});

/* SMOOTH DRAG */
items.forEach(item => {
    let isDragging = false;
    let startX, startY;

    item.dataset.dx = 0;
    item.dataset.dy = 0;

    item.addEventListener("mousedown", (e) => {
        isDragging = true;
        item.style.cursor = "grabbing";

        startX = e.clientX;
        startY = e.clientY;

        item.style.transition = "none";
    });

    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        let dx = parseFloat(item.dataset.dx);
        let dy = parseFloat(item.dataset.dy);

        const moveX = dx + (e.clientX - startX);
        const moveY = dy + (e.clientY - startY);

        item.style.transform =
            `translate(calc(var(--x) + ${moveX}px), calc(var(--y) + ${moveY}px)) 
             rotate(var(--r)) scale(1)`;
    });

    document.addEventListener("mouseup", (e) => {
        if (!isDragging) return;

        let dx = parseFloat(item.dataset.dx);
        let dy = parseFloat(item.dataset.dy);

        dx += (e.clientX - startX);
        dy += (e.clientY - startY);

        item.dataset.dx = dx;
        item.dataset.dy = dy;

        isDragging = false;
        item.style.cursor = "grab";
    });
});

/* GRAIN */
const canvas = document.getElementById("grain");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function grain() {
    const w = canvas.width;
    const h = canvas.height;

    const imageData = ctx.createImageData(w, h);
    const buffer = new Uint32Array(imageData.data.buffer);

    for (let i = 0; i < buffer.length; i++) {
        const val = Math.random() * 255 | 0;
        buffer[i] = (255 << 24) | (val << 16) | (val << 8) | val;
    }

    ctx.putImageData(imageData, 0, 0);
    requestAnimationFrame(grain);
}

grain();
</script>

</body>
</html>
